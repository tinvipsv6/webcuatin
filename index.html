<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vũ trụ Không gian | Nguyễn Trương Tín</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden; /* Ẩn thanh cuộn */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Lớp phủ nội dung ở giữa */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Để chuột xuyên qua tác động lên canvas */
        }

        .content h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #8892b0;
            text-transform: uppercase;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Nguyễn Trương Tín</h1>
        <p>Không gian Kỹ thuật số</p>
    </div>

    <canvas id="universe"></canvas>

    <script>
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        const numStars = 800; // Số lượng ngôi sao
        let speed = 2; // Tốc độ bay (warp speed)

        // Tọa độ chuột để tạo hiệu ứng chuyển động
        let mouseX = 0;
        let mouseY = 0;
        let centerX, centerY;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;

            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
        }

        // Lớp Ngôi sao 3D
        class Star {
            constructor() {
                this.x = Math.random() * width - centerX;
                this.y = Math.random() * height - centerY;
                this.z = Math.random() * width; // Chiều sâu 3D
                this.pz = this.z; // Chiều sâu khung hình trước (để vẽ vệt sáng)
            }

            update() {
                this.z -= speed; // Ngôi sao bay về phía camera

                // Nếu sao bay qua màn hình, reset nó lại tít đằng xa
                if (this.z < 1) {
                    this.x = Math.random() * width - centerX;
                    this.y = Math.random() * height - centerY;
                    this.z = width;
                    this.pz = this.z;
                }
            }

            draw() {
                // Ánh xạ tọa độ 3D sang 2D màn hình
                let sx = (this.x / this.z) * width + centerX;
                let sy = (this.y / this.z) * height + centerY;

                // Tọa độ của khung hình trước đó (tạo vệt sáng)
                let px = (this.x / this.pz) * width + centerX;
                let py = (this.y / this.pz) * height + centerY;

                this.pz = this.z;

                // Thay đổi màu sắc và độ sáng dựa vào khoảng cách
                let brightness = (1 - this.z / width);
                ctx.lineWidth = brightness * 3;
                
                // Hiệu ứng màu xanh Electric Blue
                ctx.strokeStyle = `rgba(0, 210, 255, ${brightness})`; 

                // Vẽ vệt sao
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
            }
        }

        function animate() {
            // Hiệu ứng làm mờ nhẹ khung hình trước thay vì xóa hẳn (tạo ảo giác siêu tốc độ)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Cập nhật vị trí trung tâm vũ trụ dựa trên chuột (parallax effect)
            centerX += (width / 2 - mouseX - centerX) * 0.05;
            centerY += (height / 2 - mouseY - centerY) * 0.05;

            // Di chuyển và vẽ các ngôi sao
            for (let star of stars) {
                star.update();
                star.draw();
            }

            requestAnimationFrame(animate);
        }

        // Lắng nghe sự kiện
        window.addEventListener('resize', init);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - width / 2;
            mouseY = e.clientY - height / 2;
        });

        // Bắt đầu
        init();
        animate();
    </script>
</body>
</html>
